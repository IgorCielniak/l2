name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-l2eval:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Build l2eval static library
        run: bash tools/build_l2eval_lib.sh

      - name: Upload l2eval artifact
        uses: actions/upload-artifact@v4
        with:
          name: l2eval-static
          path: build/libl2eval.a
          if-no-files-found: error

  test:
    needs: build-l2eval
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm binutils

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install keystone-engine

      - name: Download l2eval artifact
        uses: actions/download-artifact@v4
        with:
          name: l2eval-static
          path: build

      - name: Run tests
        run: python3 test.py -v && python3 test.py --ct-run-main -v
        timeout-minutes: 30

      - name: Run leak checks
        run: python3 test.py --leak-check
        timeout-minutes: 20

      - name: Run integrity checks
        run: |
          python3 main.py --check-integrity
          python3 main.py tests/general/hello.sl --check-integrity
        timeout-minutes: 20
